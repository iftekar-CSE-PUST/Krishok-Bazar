            { id: 7, name: 'ইউরিয়া সার (প্রিমিয়াম)', category: 'Fertilizer', price: 1100, oldPrice: 0, unit: '৫০ কেজি', rating: 4.5, stock: 150, image: 'https://images.unsplash.com/photo-1416879595882-3373a0480b5b?auto=format&fit=crop&w=400&q=80', description: 'উচ্চ মানের নাইট্রোজেন সমৃদ্ধ ইউরিয়া সার, দ্রুত বৃদ্ধির জন্য।' },
            { id: 8, name: 'মরিচের উন্নত বীজ', category: 'Seeds', price: 220, oldPrice: 280, unit: '২০ গ্রাম', rating: 4.6, stock: 90, image: 'https://images.unsplash.com/photo-1583119022894-919a68a3d0e3?auto=format&fit=crop&w=400&q=80', description: 'ঝাল ও ফলন দুটোই বেশি, রোগ প্রতিরোধী কাঁচা মরিচের বীজ।' },
            { id: 9, name: 'ভার্মি কম্পোস্ট (কেঁচো সার)', category: 'Fertilizer', price: 260, oldPrice: 0, unit: '১০ কেজি', rating: 4.9, stock: 120, image: 'https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&w=400&q=80', description: 'সম্পূর্ণ জৈব কেঁচো সার, সবজি ও ফল চাষে আদর্শ।' },
            { id: 10, name: 'আগাছানাশক উইড ক্লিন', category: 'Pesticides', price: 520, oldPrice: 0, unit: '১ লিটার', rating: 4.2, stock: 0, image: 'https://images.unsplash.com/photo-1492496913980-501348b61469?auto=format&fit=crop&w=400&q=80', description: 'ক্ষেতের অবাঞ্ছিত আগাছা দূর করতে নিরাপদ ও কার্যকর।' },
        ];

        // =====================================================
        // ===  BOLTDB — Now syncs with Supabase  ===
        // =====================================================
        const BoltDB = {
            init: () => {
                if (!localStorage.getItem('bolt_products')) localStorage.setItem('bolt_products', JSON.stringify(MOCK_PRODUCTS));
                if (!localStorage.getItem('bolt_orders')) localStorage.setItem('bolt_orders', JSON.stringify([]));
                if (!localStorage.getItem('bolt_users')) localStorage.setItem('bolt_users', JSON.stringify([]));
            },
            getProducts: () => JSON.parse(localStorage.getItem('bolt_products')),

            // ── Fetch products from Supabase (called on app init & refresh) ──
            fetchProductsFromSupabase: async () => {
                try {
                    const { data, error } = await supabaseClient
                        .from('products')
                        .select('*')
                        .order('id', { ascending: true });
                    if (!error && data && data.length > 0) {
                        const mapped = data.map(p => ({
                            id: p.id, name: p.name, category: p.category,
                            price: Number(p.price), oldPrice: Number(p.old_price) || 0,
                            unit: p.unit || '', rating: Number(p.rating) || 0,
                            stock: Number(p.stock), image: p.image || '',
                            description: p.description || ''
                        }));
                        localStorage.setItem('bolt_products', JSON.stringify(mapped));
                        console.log('[Supabase Products] ✅ Loaded', mapped.length, 'products');
                        return mapped;
                    }
                } catch (err) {
                    console.warn('[Supabase Products] Fetch failed, using localStorage:', err.message);
                }
                return JSON.parse(localStorage.getItem('bolt_products'));
            },

            saveProduct: (p) => {
                const products = BoltDB.getProducts();
                if (p.id && products.find(x => x.id === p.id)) {
                    const idx = products.findIndex(x => x.id === p.id);
                    products[idx] = p;
                } else {
                    if (!p.id) p.id = Date.now();
                    products.push(p);
                }
                localStorage.setItem('bolt_products', JSON.stringify(products));

                // Sync to Supabase
                supabaseClient.from('products').upsert({
                    id: p.id, name: p.name, category: p.category,
                    price: p.price, old_price: p.oldPrice || 0,
                    unit: p.unit || '', rating: p.rating || 0,
                    stock: p.stock || 0, image: p.image || '',
                    description: p.description || '',
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' }).then(({ error }) => {
                    if (error) console.warn('[Supabase Products] Upsert error:', error.message);
                    else console.log('[Supabase Products] ✅ Product synced:', p.name);
                });
            },

            deleteProduct: (id) => {
                let products = BoltDB.getProducts();
                products = products.filter(p => p.id !== id);
                localStorage.setItem('bolt_products', JSON.stringify(products));

                // Delete from Supabase
                supabaseClient.from('products').delete().eq('id', id).then(({ error }) => {
                    if (error) console.warn('[Supabase Products] Delete error:', error.message);
                    else console.log('[Supabase Products] ✅ Product deleted:', id);
                });
            },

            // ── Orders: localStorage + Supabase sync ──
            getOrders: () => JSON.parse(localStorage.getItem('bolt_orders')),

            saveOrder: (order) => {
                // 1) Build the order locally
                const orders = BoltDB.getOrders();
                order.id = 'ORD-' + Math.floor(Math.random() * 1000000);
                order.date = new Date().toISOString();
                order.status = 'Pending';
                const deliveryDate = new Date();
                deliveryDate.setDate(deliveryDate.getDate() + 5);
                order.estimatedDelivery = deliveryDate.toISOString();

                orders.push(order);
                localStorage.setItem('bolt_orders', JSON.stringify(orders));

                // 2) Async push to Supabase (fire-and-forget, localStorage is source of truth)
                supabaseClient.from('orders').insert({
                    order_id: order.id,
                    user_id: String(order.userId || 'guest'),
                    customer_name: order.customerInfo?.name || '',
                    customer_phone: order.customerInfo?.phone || '',
                    customer_address: order.customerInfo?.address || '',
                    customer_district: order.customerInfo?.district || '',
                    customer_note: order.customerInfo?.note || '',
                    items: order.items,
                    subtotal: order.subtotal,
                    delivery_charge: order.deliveryCharge,
                    total: order.total,
                    payment_method: order.paymentMethod,
                    transaction_id: order.transactionId || null,
                    status: order.status,
                    estimated_delivery: order.estimatedDelivery,
                    created_at: order.date
                }).then(({ error }) => {
                    if (error) console.warn('[Supabase Orders] Insert error:', error.message);
                    else console.log('[Supabase Orders] ✅ Order synced:', order.id);
                });

                return order;
            },

            updateOrderStatus: (id, status) => {
                const orders = BoltDB.getOrders();
                const order = orders.find(o => o.id === id);
                if (order) order.status = status;
                localStorage.setItem('bolt_orders', JSON.stringify(orders));

                // Sync status update to Supabase
                supabaseClient.from('orders').update({ status })
                    .eq('order_id', id)
                    .then(({ error }) => {
                        if (error) console.warn('[Supabase Orders] Status update error:', error.message);
                        else console.log('[Supabase Orders] ✅ Status updated:', id, '->', status);
                    });
            },

            deleteOrder: (id) => {
                let orders = BoltDB.getOrders();
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('bolt_orders', JSON.stringify(orders));

                // Delete from Supabase
                supabaseClient.from('orders').delete()
                    .eq('order_id', id)
                    .then(({ error }) => {
                        if (error) console.warn('[Supabase Orders] Delete error:', error.message);
                        else console.log('[Supabase Orders] ✅ Order deleted:', id);
                    });
            },

            cancelOrder: (id) => {
                const orders = BoltDB.getOrders();
                const order = orders.find(o => o.id === id);
                if (order && (order.status === 'Pending' || order.status === 'Processing')) {
                    order.status = 'Cancelled';
                    localStorage.setItem('bolt_orders', JSON.stringify(orders));
                    supabaseClient.from('orders').update({ status: 'Cancelled' })
                        .eq('order_id', id)
                        .then(({ error }) => {
                            if (error) console.warn('[Supabase Orders] Cancel error:', error.message);
                            else console.log('[Supabase Orders] ✅ Order cancelled:', id);
                        });
                    return true;
                }
                return false;
            },

            // ── Authentication: Supabase Auth + localStorage fallback ──
            _hash: (str) => {
                let h = 0x811c9dc5;
                for (let i = 0; i < str.length; i++) {
                    h ^= str.charCodeAt(i);
                    h = Math.imul(h, 0x01000193);
                }
                return ('00000000' + (h >>> 0).toString(16)).slice(-8) + str.length.toString(16);
            },

            login: async (email, password) => {
                const e = (email || '').trim();

                // Admin credentials (hashed, obfuscated — static-site only)
                const ADMIN_EMAIL_HASH = '34c836145';
                const ADMIN_PASS_HASH = '20dcd320a';
                if (BoltDB._hash(e) === ADMIN_EMAIL_HASH && BoltDB._hash(password) === ADMIN_PASS_HASH) {
                    return { id: 1, role: 'admin', name: 'Admin Riad' };
                }

                // Try Supabase Auth first
                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: e,
                        password: password
                    });
                    if (!error && data?.user) {
                        const name = data.user.user_metadata?.name || data.user.email?.split('@')[0] || 'User';
                        console.log('[Supabase Auth] ✅ Login success:', data.user.email);
                        return { id: data.user.id, name, email: data.user.email, role: 'user', supabase: true };
                    }
                } catch (sbErr) {
                    console.warn('[Supabase Auth] Login attempt failed, falling back to localStorage:', sbErr.message);
                }

                // Fallback to localStorage users
                const users = JSON.parse(localStorage.getItem('bolt_users'));
                const user = users.find(u => u.email === e && u.password === BoltDB._hash(password));
                if (user) return { id: user.id, name: user.name, email: user.email, role: 'user' };

                throw new Error('ভুল ইমেইল বা পাসওয়ার্ড / Invalid credentials');
            },

            register: async (name, email, password) => {
                const e = (email || '').trim();
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) throw new Error('সঠিক ইমেইল দিন / Enter a valid email');
                if ((password || '').length < 6) throw new Error('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে / Password must be at least 6 characters');

                // Try Supabase Auth signup
                try {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: e,
                        password: password,
                        options: { data: { name: name } }
                    });
                    if (!error && data?.user) {
                        console.log('[Supabase Auth] ✅ Registration success:', data.user.email);

                        // Also save profile to 'users' table
                        supabaseClient.from('users').insert({
                            auth_id: data.user.id,
                            name: name,
                            email: e,
                            registered_at: new Date().toISOString()
                        }).then(({ error: pErr }) => {
                            if (pErr) console.warn('[Supabase Users] Profile insert error:', pErr.message);
                            else console.log('[Supabase Users] ✅ Profile saved');
                        });

                        return { id: data.user.id, role: 'user', name, email: e, supabase: true };
                    }
                    if (error) {
                        console.warn('[Supabase Auth] Signup error:', error.message);
                        // If it's a duplicate email error from Supabase
                        if (error.message.includes('already') || error.message.includes('exists')) {
                            throw new Error('এই ইমেইলটি ব্যবহার করা হয়েছে / Email already exists');
                        }
                    }
                } catch (sbErr) {
                    if (sbErr.message.includes('ইমেইল') || sbErr.message.includes('Email')) throw sbErr;
                    console.warn('[Supabase Auth] Signup failed, falling back to localStorage:', sbErr.message);
                }

                // Fallback: localStorage registration
                const users = JSON.parse(localStorage.getItem('bolt_users'));
                if (users.find(u => u.email === e)) throw new Error('এই ইমেইলটি ব্যবহার করা হয়েছে / Email already exists');
                const newUser = { id: Date.now(), name, email: e, password: BoltDB._hash(password), registeredAt: new Date().toISOString() };
                users.push(newUser);
                localStorage.setItem('bolt_users', JSON.stringify(users));
                return { id: newUser.id, role: 'user', name, email: e };
            },

            getUsers: () => JSON.parse(localStorage.getItem('bolt_users'))
        };
        BoltDB.init();

        // --- App Context ---
        const AppContext = createContext();

        const DELIVERY_CHARGE = 60;
        const FREE_DELIVERY_THRESHOLD = 2000;

        const AppProvider = ({ children }) => {
            const [route, setRoute] = useState({ page: 'Home', params: {} });
            const [user, setUser] = useState(() => {
                try { return JSON.parse(localStorage.getItem('bolt_session')) || null; } catch { return null; }
            });

                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + quantity } : item);
                    }
                    return [...prev, { ...product, quantity }];
                });
                notify(`${product.name} কার্টে যোগ হয়েছে`, 'success');
                setIsCartOpen(true);
            };

            const updateCartQuantity = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQ = item.quantity + delta;
                        return newQ > 0 ? { ...item, quantity: newQ } : item;
                    }
                    return item;
                }));

                                className="fixed inset-0 bg-black bg-opacity-50 z-50"
                                onClick={() => setIsCartOpen(false)}
                            />
                            <motion.div 
                                initial={{ x: '100%' }} animate={{ x: 0 }} exit={{ x: '100%' }} transition={{ type: 'spring', damping: 25 }}
                                className="fixed top-0 right-0 w-full sm:w-96 h-full bg-white shadow-2xl z-50 flex flex-col"
                            >
                                <div className="p-4 bg-agri-600 text-white flex justify-between items-center">
                                    <h2 className="text-xl font-bold"><i className="fa-solid fa-basket-shopping mr-2"></i> আপনার কার্ট</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-white hover:text-agri-100 text-2xl">&times;</button>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto p-4 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="text-center text-gray-500 mt-10">
                                            <i className="fa-solid fa-box-open text-4xl mb-4 opacity-50"></i>
                                            <p>কার্ট খালি আছে!</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex gap-4 border-b border-gray-100 pb-4">
                                                <img src={item.image} alt={item.name} className="w-20 h-20 object-cover rounded" />
                                                <div className="flex-grow">
                                                    <h4 className="font-bold text-gray-800 line-clamp-1">{item.name}</h4>
                                                    <p className="text-agri-600">{item.price} ৳</p>
                                                    <div className="flex items-center mt-2 space-x-2">
                                                        <button onClick={() => updateCartQuantity(item.id, -1)} className="w-8 h-8 rounded bg-gray-100 hover:bg-gray-200 flex items-center justify-center">-</button>
                                                        <span className="font-medium">{item.quantity}</span>
                                                        <button onClick={() => updateCartQuantity(item.id, 1)} className="w-8 h-8 rounded bg-gray-100 hover:bg-gray-200 flex items-center justify-center">+</button>
                                                    </div>
                                                </div>
                                                <button onClick={() => removeFromCart(item.id)} className="text-red-500 hover:text-red-700 self-start p-2">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="p-4 border-t border-gray-200 bg-gray-50">
                                    {cart.length > 0 && remainingForFree > 0 && (
                                        <div className="mb-3 text-xs text-gray-600 bg-agri-50 rounded-lg p-2 text-center">
                                            আর <span className="font-bold text-agri-700">{remainingForFree} ৳</span> কিনলে ফ্রি ডেলিভারি! 🚚
                                        </div>
                                    )}
                                    <div className="space-y-1 mb-3 text-sm">
                                        <div className="flex justify-between"><span className="text-gray-600">সাবটোটাল:</span><span>{cartTotal} ৳</span></div>
                                        <div className="flex justify-between"><span className="text-gray-600">ডেলিভারি চার্জ:</span><span>{deliveryCharge === 0 ? <span className="text-agri-600 font-semibold">ফ্রি</span> : `${deliveryCharge} ৳`}</span></div>
                                    </div>
                                    <div className="flex justify-between items-center mb-4 text-lg font-bold border-t border-gray-200 pt-2">
                                        <span>সর্বমোট:</span>
                                        <span className="text-agri-700">{grandTotal} ৳</span>
                                    </div>
                                    <button 
                                        disabled={cart.length === 0}
                                        onClick={() => { setIsCartOpen(false); navigate('Checkout'); }}
                                        className="w-full bg-agri-amber hover:bg-agri-amberDark text-white font-bold py-3 rounded-lg shadow-md transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        চেকআউট করুন
                                    </button>
                                </div>
                            </motion.div>
                        </>
                    )}
                </AnimatePresence>
            );
        };

        // --- Pages ---

            const [payment, setPayment] = useState('cod');
            const [txnId, setTxnId] = useState('');
            const [orderSuccess, setOrderSuccess] = useState(null);
            const [errors, setErrors] = useState({});

            const validate = () => {
                const er = {};
                if (!formData.name.trim()) er.name = 'নাম দিন';
                if (!/^01[3-9]\d{8}$/.test(formData.phone.trim())) er.phone = 'সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন (01XXXXXXXXX)';
                if (!formData.address.trim()) er.address = 'ঠিকানা দিন';
                if (!formData.district.trim()) er.district = 'জেলা দিন';
                if (payment !== 'cod' && !/^[A-Za-z0-9]{6,}$/.test(txnId.trim())) er.txnId = 'সঠিক ট্রানজেকশন আইডি দিন';
                setErrors(er);
                return Object.keys(er).length === 0;
            };

            const [submitting, setSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (cart.length === 0) return;
                if (!validate()) { notify('ফর্মটি সঠিকভাবে পূরণ করুন', 'error'); return; }
                setSubmitting(true);

                try {
                    // 1) Save order locally + Supabase
                    const newOrder = BoltDB.saveOrder({
                        userId: user?.id || 'guest',
                        customerInfo: formData,
                        items: cart,
                        subtotal: cartTotal,
                        deliveryCharge: deliveryCharge,
                        total: grandTotal,
                        paymentMethod: payment,
                        transactionId: payment === 'cod' ? null : txnId.trim()
                    });

                    // 2) Send full order details to Formspree
                    const itemsList = cart.map(item =>
                        `• ${item.name} (x${item.quantity}) — ${item.price * item.quantity} ৳`
                    ).join('\n');

                    const paymentLabel = { cod: 'ক্যাশ অন ডেলিভারি', bkash: 'বিকাশ', nagad: 'নগদ' }[payment] || payment;

                    const formspreeData = {
                        '🆔 Order ID':        newOrder.id,
                        '📅 Order Date':       new Date(newOrder.date).toLocaleString('bn-BD'),
                        '👤 Customer Name':    formData.name,
                        '📞 Phone':            formData.phone,
                        '🏙️ District':         formData.district,
                        '📍 Address':          formData.address,
                        '📝 Note':             formData.note || '—',
                        '💳 Payment Method':   paymentLabel,
                        '🔖 Transaction ID':   payment !== 'cod' ? (txnId.trim() || '—') : '—',
                        '🛒 Items':            itemsList,
                        '🧾 Subtotal':         `${cartTotal} ৳`,
                        '🚚 Delivery Charge':  deliveryCharge === 0 ? 'ফ্রি' : `${deliveryCharge} ৳`,
                        '💰 Grand Total':      `${grandTotal} ৳`,
                        '_subject':            `🌿 নতুন অর্ডার: ${newOrder.id} — ${formData.name}`,
                    };

                    fetch('https://formspree.io/f/xqeozgjz', {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(formspreeData),
                    }).then(res => {
                        if (res.ok) console.log('[Formspree] ✅ Order email sent:', newOrder.id);
                        else res.json().then(d => console.warn('[Formspree] ❌ Error:', d));
                    }).catch(err => console.warn('[Formspree] Network error:', err.message));

                    clearCart();
                    setOrderSuccess(newOrder.id);
                    notify('অর্ডার সফল! ইমেইল পাঠানো হচ্ছে... ✅', 'success');
                } catch (err) {
                    notify('অর্ডার প্রক্রিয়ায় সমস্যা হয়েছে', 'error');
                } finally {
                    setSubmitting(false);
                }
            };

                            <button onClick={() => navigate('Home')} className="bg-agri-600 hover:bg-agri-700 text-white px-6 py-2 rounded-lg font-bold transition">হোমে ফিরে যান</button>

                    </motion.div>
                );
            }

            const errCls = "text-red-500 text-xs mt-1";
            const payOptions = [
                { id: 'cod', label: 'ক্যাশ অন ডেলিভারি', icon: 'fa-money-bill-wave', color: 'text-agri-600' },
                { id: 'bkash', label: 'বিকাশ', icon: 'fa-mobile-screen', color: 'text-pink-600' },
                { id: 'nagad', label: 'নগদ', icon: 'fa-mobile-screen-button', color: 'text-orange-500' },
            ];
            const payNumbers = { bkash: '01773686642', nagad: '01773686642' };

            return (
                <div className="max-w-5xl mx-auto px-4 py-12 min-h-screen">

                        {/* Form */}

                            <div className="bg-white p-6 rounded-xl shadow-md">
                                <h2 className="text-xl font-bold mb-6 text-agri-800">ডেলিভারি তথ্য</h2>
                                <form onSubmit={handleSubmit} className="space-y-4" id="checkout-form">
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">সম্পূর্ণ নাম</label>
                                        <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-agri-500" placeholder="আপনার নাম লিখুন" />
                                        {errors.name && <p className={errCls}>{errors.name}</p>}
                                    </div>

        // --- Admin Dashboard (English as requested) ---
        const AdminDashboard = () => {

            const [activeTab, setActiveTab] = useState('Overview');
            
            // Stats & Data
            const [products, setAdminProducts] = useState([]);
            const [orders, setAdminOrders] = useState([]);
            const [users, setAdminUsers] = useState([]);

            // Form states
            const [showProductForm, setShowProductForm] = useState(false);
            const [editProduct, setEditProduct] = useState(null);
            
            const loadData = async () => {
                const prods = await BoltDB.fetchProductsFromSupabase();
                setAdminProducts(prods || BoltDB.getProducts());
                setAdminUsers(BoltDB.getUsers());

                // ── Orders: Fetch from Supabase first, fallback to localStorage ──
                try {
                    const { data, error } = await supabaseClient
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (!error && data && data.length > 0) {
                        // Map Supabase columns back to the format the dashboard expects
                        const sbOrders = data.map(o => ({
                            id: o.order_id,
                            userId: o.user_id,
                            customerInfo: {
                                name: o.customer_name,
                                phone: o.customer_phone,
                                address: o.customer_address,
                                district: o.customer_district,
                                note: o.customer_note
                            },
                            items: o.items || [],
                            subtotal: Number(o.subtotal),
                            deliveryCharge: Number(o.delivery_charge),
                            total: Number(o.total),
                            paymentMethod: o.payment_method,
                            transactionId: o.transaction_id,
                            status: o.status,
                            date: o.created_at,
                            estimatedDelivery: o.estimated_delivery
                        }));
                        setAdminOrders(sbOrders);
                        console.log('[Admin] ✅ Orders loaded from Supabase:', sbOrders.length);
                        return;
                    }
                    if (error) console.warn('[Admin] Supabase orders fetch error:', error.message);
                } catch (err) {
                    console.warn('[Admin] Supabase fetch failed, using localStorage:', err.message);
                }

                // Fallback: use localStorage orders
                setAdminOrders(BoltDB.getOrders());
            };

                if (!user || user.role !== 'admin') navigate('Home');
                else loadData();
            }, [user, activeTab]);

            const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);

            // Image Upload → Supabase Storage (with base64 fallback)
            const handleImageUpload = async (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;

                // Try Supabase Storage upload first
                try {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `product_${Date.now()}.${fileExt}`;
                    const filePath = `products/${fileName}`;

                    const { data, error } = await supabaseClient.storage
                        .from('product-images')
                        .upload(filePath, file, {
                            cacheControl: '3600',
                            upsert: false
                        });

                    if (error) throw error;

                    // Get public URL
                    const { data: urlData } = supabaseClient.storage
                        .from('product-images')
                        .getPublicUrl(filePath);

                    if (urlData?.publicUrl) {
                        console.log('[Supabase Storage] ✅ Image uploaded:', urlData.publicUrl);
                        callback(urlData.publicUrl);
                        return;
                    }
                } catch (storageErr) {
                    console.warn('[Supabase Storage] Upload failed, using base64 fallback:', storageErr.message);
                }

                // Fallback: base64 DataURL (works offline / if storage fails)
                const reader = new FileReader();
                reader.onloadend = () => callback(reader.result);
                reader.readAsDataURL(file);
            };

            const ProductForm = () => {
                const [form, setForm] = useState(editProduct || { name: '', category: 'Pesticides', price: '', oldPrice: '', unit: '', rating: 4.5, stock: '', description: '', image: '' });

                    setEditProduct(null);
                    loadData();
                    refreshProducts();
                };

                const onImageSelect = async (e) => {

                                    <select className="w-full border p-2 rounded" value={form.category} onChange={e=>setForm({...form, category: e.target.value})}>

                                        <option value="Seeds">Seeds</option>
                                        <option value="Fertilizer">Organic Fertilizer</option>
                                    </select>
                                </div>

const MyOrders = () => {
    const { user, navigate, notify } = useContext(AppContext);
    const [orders, setOrders] = useState([]);

    useEffect(() => {
        if (!user) { navigate('Auth'); return; }

        const loadOrders = async () => {
            // Try Supabase first for real-time cross-device orders
            try {
                const { data, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('user_id', String(user.id))
                    .order('created_at', { ascending: false });

                if (!error && data && data.length > 0) {
                    const sbOrders = data.map(o => ({
                        id: o.order_id,
                        userId: o.user_id,
                        customerInfo: {
                            name: o.customer_name,
                            phone: o.customer_phone,
                            address: o.customer_address,
                            district: o.customer_district,
                            note: o.customer_note
                        },
                        items: o.items || [],
                        subtotal: Number(o.subtotal),
                        deliveryCharge: Number(o.delivery_charge),
                        total: Number(o.total),
                        paymentMethod: o.payment_method,
                        transactionId: o.transaction_id,
                        status: o.status,
                        date: o.created_at,
                        estimatedDelivery: o.estimated_delivery
                    }));
                    setOrders(sbOrders);
                    console.log('[MyOrders] ✅ Loaded from Supabase:', sbOrders.length);
                    return;
                }
            } catch (err) {
                console.warn('[MyOrders] Supabase fetch failed, using localStorage');
            }

            // Fallback: localStorage
            const allOrders = BoltDB.getOrders();
            setOrders(allOrders.filter(o => o.userId === user.id).reverse());
        };

        loadOrders();
    }, [user]);

    if (!user) return null;

    const payBn = { cod: 'ক্যাশ অন ডেলিভারি', bkash: 'বিকাশ', nagad: 'নগদ' };

    const handleCancelOrder = (orderId) => {
        if (!confirm('আপনি কি সত্যিই এই অর্ডারটি বাতিল করতে চান?')) return;
        const success = BoltDB.cancelOrder(orderId);
        if (success) {
            setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status: 'Cancelled' } : o));
            notify('অর্ডারটি সফলভাবে বাতিল করা হয়েছে।', 'info');
        } else {
            notify('এই অর্ডারটি বাতিল করা সম্ভব নয়।', 'error');
        }
    };

    return (
        <div className="max-w-5xl mx-auto px-4 py-12 min-h-screen">
            <h1 className="text-3xl font-bold text-gray-800 mb-8 border-b pb-4"><i className="fa-solid fa-box-open text-agri-600 mr-3"></i>আমার অর্ডারসমূহ</h1>
            {orders.length === 0 ? (
                <div className="bg-white p-12 rounded-2xl shadow text-center text-gray-500">
                    <i className="fa-solid fa-cart-shopping text-5xl mb-4 opacity-20"></i>
                    <p className="text-xl mb-6">আপনার কোনো অর্ডার নেই।</p>
                    <button onClick={() => navigate('Home')} className="bg-agri-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-agri-700 transition">কেনাকাটা শুরু করুন</button>
                </div>
            ) : (
                <div className="space-y-8">
                    {orders.map(order => (
                        <div key={order.id} className={`bg-white rounded-2xl shadow-md border overflow-hidden ${order.status === 'Cancelled' ? 'border-red-200 opacity-80' : 'border-agri-100'}`}>
                            <div className={`p-6 border-b flex flex-col md:flex-row justify-between md:items-center gap-4 ${order.status === 'Cancelled' ? 'bg-red-50 border-red-100' : 'bg-agri-50 border-agri-100'}`}>
                                <div>
                                    <p className="font-bold text-agri-800">অর্ডার আইডি: {order.id}</p>
                                    <p className="text-sm text-gray-500">অর্ডার তারিখ: {new Date(order.date).toLocaleDateString('bn-BD')}</p>
                                    {order.status === 'Cancelled' && (
                                        <span className="inline-flex items-center gap-1 mt-1 text-xs font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded-full">

                                        </div>
                                    )}
                                    <div className="text-right">
                                        <p className="text-xs text-gray-500">মোট মূল্য</p>
                                        <p className={`text-lg font-bold ${order.status === 'Cancelled' ? 'text-gray-400 line-through' : 'text-agri-800'}`}>{order.total} ৳</p>
                                    </div>
                                    {(order.status === 'Pending' || order.status === 'Processing') && (
                                        <button
                                            onClick={() => handleCancelOrder(order.id)}
                                            className="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white text-sm font-bold px-4 py-2 rounded-lg transition shadow"
                                        >
                                            <i className="fa-solid fa-ban"></i> অর্ডার বাতিল করুন
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="p-6">
                                <h3 className="text-sm font-bold text-gray-600 uppercase tracking-wider mb-6">অর্ডার প্রোগ্রেস:</h3>
                                <div className="mb-8">
                                    <OrderStatusStepper status={order.status} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div>
                                        <h4 className="font-bold text-gray-800 mb-3 flex items-center"><i className="fa-solid fa-list-ul mr-2 text-agri-600"></i>অর্ডার করা পণ্য:</h4>
                                        <div className="space-y-2">
                                            {order.items.map((item, idx) => (
                                                <div key={idx} className="flex justify-between text-sm py-2 border-b border-gray-100 last:border-0">
                                                    <span className="text-gray-700">{item.name} <span className="text-gray-400">x {item.quantity}</span></span>
                                                    <span className="font-medium">{item.price * item.quantity} ৳</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-xl">
                                        <h4 className="font-bold text-gray-800 mb-3 flex items-center"><i className="fa-solid fa-circle-info mr-2 text-agri-600"></i>তথ্য:</h4>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between"><span className="text-gray-500">পেমেন্ট পদ্ধতি:</span><span className="font-medium">{payBn[order.paymentMethod] || order.paymentMethod}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-500">ঠিকানা:</span><span className="font-medium text-right">{order.customerInfo?.address}, {order.customerInfo?.district}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-500">মোবাইল নম্বর:</span><span className="font-medium">{order.customerInfo?.phone}</span></div>
                                            {order.transactionId && <div className="flex justify-between"><span className="text-gray-500">TrxID:</span><span className="font-medium">{order.transactionId}</span></div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
};

        const BackToTop = () => {
            const [show, setShow] = useState(false);
            useEffect(() => {
                const onScroll = () => setShow(window.scrollY > 400);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return (
                <AnimatePresence>
                    {show && (
                        <motion.button
                            initial={{ opacity: 0, scale: 0.5 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.5 }}
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            className="fixed bottom-5 left-5 z-40 w-11 h-11 rounded-full bg-agri-600 hover:bg-agri-700 text-white shadow-lg flex items-center justify-center"
                            aria-label="উপরে যান">
                            <i className="fa-solid fa-arrow-up"></i>
                        </motion.button>
                    )}
                </AnimatePresence>
            );
        };

        const MainContent = () => {
            const { route } = useContext(AppContext);
            
            // Do not show navbar/footer in Admin view
            if (route.page === 'Admin') return <AdminDashboard />;

            return (
                <div className="flex flex-col min-h-screen">
                    <Navbar />
                    <CartDrawer />
                    <BackToTop />
                    <main className="flex-grow">
                        {route.page === 'Home' && <Home />}
                        {route.page === 'Category' && <CategoryPage categoryName={route.params.cat === 'Pesticides' ? 'কীটনাশক' : route.params.cat === 'Seeds' ? 'বীজ' : 'জৈব সার'} filterId={route.params.cat} />}
                        {route.page === 'ProductDetail' && <ProductDetail id={route.params.id} />}
                        {route.page === 'Search' && <SearchPage query={route.params.q} />}
                        {route.page === 'Wishlist' && <WishlistPage />}
                        {route.page === 'MyOrders' && <MyOrders />}
                        {route.page === 'Checkout' && <Checkout />}
                        {route.page === 'Auth' && <AuthPage />}
                        {route.page === 'Profile' && <UserProfile />}
                    </main>
                    <Footer />
                </div>
            );
        };

        const App = () => {
            return (
                <AppProvider>
                    <MainContent />
                </AppProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
